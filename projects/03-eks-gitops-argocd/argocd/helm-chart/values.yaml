# ArgoCD Helm values for EKS Fargate deployment

server:
  service:
    type: LoadBalancer
  # Run insecure — TLS terminates at the load balancer
  extraArgs:
    - --insecure
  resources:
    requests:
      cpu: 256m
      memory: 256Mi
    limits:
      cpu: 512m
      memory: 512Mi

controller:
  resources:
    requests:
      cpu: 256m
      memory: 512Mi
    limits:
      cpu: 512m
      memory: 1Gi

repoServer:
  resources:
    requests:
      cpu: 256m
      memory: 256Mi
    limits:
      cpu: 512m
      memory: 512Mi

redis:
  resources:
    requests:
      cpu: 128m
      memory: 128Mi
    limits:
      cpu: 256m
      memory: 256Mi

# Disable components not needed for this demo
dex:
  enabled: false

notifications:
  enabled: false
