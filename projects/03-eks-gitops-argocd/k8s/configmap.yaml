apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
  namespace: app
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>GitOps Demo</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
          color: #e2e8f0;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .container {
          text-align: center;
          padding: 3rem;
          background: rgba(255,255,255,0.05);
          border-radius: 1rem;
          border: 1px solid rgba(255,255,255,0.1);
          max-width: 600px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #38bdf8; }
        p { font-size: 1.1rem; line-height: 1.6; margin-bottom: 0.5rem; }
        .badge {
          display: inline-block;
          padding: 0.25rem 0.75rem;
          background: #38bdf8;
          color: #0f172a;
          border-radius: 9999px;
          font-size: 0.875rem;
          font-weight: 600;
          margin-top: 1.5rem;
        }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>GitOps Demo</h1>
        <p>Deployed via ArgoCD on Amazon EKS (Fargate)</p>
        <p>Push to Git &rarr; ArgoCD syncs &rarr; Cluster updates automatically</p>
        <span class="badge">EKS + ArgoCD + GitOps</span>
      </div>
    </body>
    </html>
